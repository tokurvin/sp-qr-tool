<script>
// ─────────────────────────────────────────────
// Check character validation (v4 · MOD 37)
// ─────────────────────────────────────────────
const OUTPUT_ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$";

function charValue(c) {
  if (c >= '0' && c <= '9') return c.charCodeAt(0) - 48;
  if (c >= 'A' && c <= 'Z') return c.charCodeAt(0) - 65 + 10;
  if (c === '-') return 36;
  return -1;
}

function computeHash(str, multiplier) {
  let acc = 0;
  for (const c of str) {
    const v = charValue(c);
    if (v < 0) return '?';
    acc = (acc * multiplier + v) % 37;
  }
  return OUTPUT_ALPHABET[acc];
}

function validateCheckChars(path, check) {
  if (check.length !== 2) return false;
  return computeHash(path, 31) === check[0] && computeHash(path, 17) === check[1];
}

// ─────────────────────────────────────────────
// Parse v4 code
// Format: {po_country}-{po_number}-{sku}-{shp#}-{boxes}-{box#}-{qty}:{c1}{c2}
// ─────────────────────────────────────────────
function parseCode(raw) {
  // Strip URL prefix if present
  const prefix = 'HTTPS://QR.SWAPPIE.COM/';
  let code = raw.toUpperCase().trim();
  if (code.startsWith(prefix)) code = code.slice(prefix.length);

  // Split on colon to get path + check chars
  const colonIdx = code.lastIndexOf(':');
  if (colonIdx < 0) return null;
  const path = code.slice(0, colonIdx);
  const check = code.slice(colonIdx + 1);
  if (check.length !== 2) return null;

  // Parse path fields: PO[A-Z]{2}-\d{8}-SKU-\d{2}-\d{2}-\d{2}-\d{4}
  const regex = /^(PO[A-Z]{2})-(\d{8})-((SM|TB|LT)APLP\d{1,5})-(\d{2})-(\d{2})-(\d{2})-(\d{4})$/;
  const m = path.match(regex);
  if (!m) return null;

  const valid = validateCheckChars(path, check);

  return {
    raw: code,
    path,
    check,
    valid,
    poCountry: m[1],        // POFI
    poNumber: m[2],         // 00088285
    sku: m[3],              // SMAPLP1003
    skuType: m[4],          // SM / TB / LT
    shipment: parseInt(m[5]),
    totalBoxes: parseInt(m[6]),
    boxNumber: parseInt(m[7]),
    qty: parseInt(m[8]),
  };
}

const UUID_RECORDS = {

};
const UUID_REGEX = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;

// ─────────────────────────────────────────────

  const app = document.getElementById('app');

  // Get code from URL hash (strip leading #)
  const raw = decodeURIComponent(window.location.hash.slice(1));

    app.innerHTML = `
      <div class="error-card">
        <div class="error-icon">🔋</div>
        <h2>No battery code provided</h2>
        <p>Scan a battery QR code or open a battery data link to view this page.</p>

    return;
  }

  if (UUID_REGEX.test(raw.trim())) {
    renderByUuid(app, raw.trim().toLowerCase());
    return;
  }

  // ── Path B: v4 QR code (battery sticker) ──
